<html>
<head>
    <title>Lesson1_BruteForce</title>
</head>
<body>
    <h1>BruteForce</h1>

    <p>Please enter a password for authentication:</p>

    <form method="POST">
        {% csrf_token %}
        <input type="password" name="password" required>
        <br><br>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <p style="font-size: 0.9em; color: gray; text-align: center;">
        This activity is part of a Girls Who Code educational exercise and is intended for learning purposes only.
    </p>
</body>
</html>
